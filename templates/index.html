<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');
        const message = input.value.trim();
        
        if (!message) return;

        sendBtn.disabled = true;
        chatBox.innerHTML += `<div class="user-msg">You: ${message}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Using the absolute URL to ensure the connection hits the right spot
            const response = await fetch('https://science-academy-2c1d.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) throw new Error('Server response error');

            const data = await response.json();
            chatBox.innerHTML += `<div class="ai-msg">${data.response}</div>`;
        } catch (error) {
            chatBox.innerHTML += `<div class="ai-msg">Error: Still can't reach the server. Try refreshing in 1 minute.</div>`;
        } finally {
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
